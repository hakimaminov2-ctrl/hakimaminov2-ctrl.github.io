<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahimov Sulolasi — Shajara</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2330;
  --gold: #d4a843; --gold2: #f0c76a; --gold3: #8a6820;
  --text: #e8dcc8; --muted: #8b7a5e; --border: #2a3441;
  --gen0: #d4a843; --gen1: #c0784a; --gen2: #5b8fa8; --gen3: #7ab67a;
  --tabs-h: 56px;
}
body { background:var(--bg); font-family:'Mulish',sans-serif; color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%,rgba(212,168,67,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 15%,rgba(212,168,67,.2) 0%,transparent 100%),
    radial-gradient(400px at 50% 0%,rgba(212,168,67,.04) 0%,transparent 70%);
}
header { position:relative; z-index:2; text-align:center; padding:48px 24px 32px; border-bottom:1px solid var(--border); }
header::after { content:''; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); width:120px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.header-sub { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; font-weight:600; }
header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,7vw,56px); color:var(--gold2); font-weight:600; line-height:1.1; margin-bottom:8px; }
.header-desc { color:var(--muted); font-size:13px; font-family:'Cormorant Garamond',serif; font-style:italic; }

/* LOADING */
#loading-screen { position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.loader { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading-screen p { color:var(--muted); font-size:13px; }

/* TABS */
.tabs { position:sticky; top:0; z-index:10; display:flex; background:rgba(13,17,23,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); height:var(--tabs-h); }
.tab { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .25s; border-bottom:2px solid transparent; letter-spacing:.5px; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab-icon { font-size:15px; }

/* VIEWS */
.view { display:none; position:relative; z-index:1; }
.view.active { display:block; }

/* BIRTHDAY BANNER */
#bday-banner { display:none; background:linear-gradient(135deg,#2a1f0a,#1a1208); border-bottom:1px solid var(--gold); padding:12px 20px; text-align:center; animation:glowPulse 2s ease-in-out infinite; }
#bday-banner.show { display:block; }
@keyframes glowPulse { 0%,100%{box-shadow:0 0 20px rgba(212,168,67,.2)} 50%{box-shadow:0 0 40px rgba(212,168,67,.4)} }
.bday-text { font-family:'Cormorant Garamond',serif; font-size:16px; color:var(--gold2); }

/* TREE */
#tree-view { padding:40px 16px 80px; overflow-x:auto; overflow-y:auto; }
.tree-wrap { min-width:max-content; display:flex; flex-direction:column; align-items:center; }
.root-node { display:flex; flex-direction:column; align-items:center; }
.root-card { background:linear-gradient(135deg,#2a1f0a,#1a1208); border:2px solid var(--gold); border-radius:16px; padding:16px 28px; text-align:center; box-shadow:0 0 30px rgba(212,168,67,.2); animation:glowPulse 3s ease-in-out infinite; }
.root-card .crown { font-size:20px; margin-bottom:4px; }
.root-card .name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--gold2); }
.root-card .wife { font-size:13px; color:var(--muted); margin-top:2px; }
.v-line { width:2px; background:linear-gradient(180deg,var(--gold3),var(--border)); flex-shrink:0; }
.gen1-row { display:flex; justify-content:center; gap:12px; width:100%; padding:0 8px; }
.branch { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; }
.person-card { border-radius:12px; padding:10px 12px; text-align:center; cursor:pointer; transition:all .2s; width:100%; border:1.5px solid; position:relative; }
.person-card:hover { transform:translateY(-2px); }
.person-card.gen1 { background:linear-gradient(135deg,#1e1208,#160d05); border-color:var(--gen1); }
.person-card.gen2 { background:linear-gradient(135deg,#0d1820,#091218); border-color:var(--gen2); }
.person-card.gen3 { background:linear-gradient(135deg,#0d1a0d,#091209); border-color:var(--gen3); }
.pcard-num { position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:var(--bg); padding:0 6px; font-size:10px; color:var(--muted); font-style:italic; font-family:'Cormorant Garamond',serif; white-space:nowrap; }
.pcard-name { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600; line-height:1.3; }
.gen1 .pcard-name { color:#e8a870; font-size:14px; }
.gen2 .pcard-name { color:#8bbfd8; }
.gen3 .pcard-name { color:#9dd49d; font-size:12px; }
.pcard-spouse { font-size:10px; color:var(--muted); margin-top:2px; }
.pcard-photo { width:44px; height:44px; border-radius:50%; object-fit:cover; margin:0 auto 6px; display:block; border:2px solid var(--border); }
.pcard-bday { font-size:9px; color:var(--gold); margin-top:2px; }
.pcard-unknown { font-size:10px; color:#4a3a2a; font-style:italic; }
.children-wrap { display:flex; flex-direction:column; align-items:center; width:100%; }
.children-row { display:flex; gap:6px; justify-content:center; width:100%; padding:0 4px; }
.child-branch { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; }
.grandchildren-row { display:flex; gap:4px; justify-content:center; width:100%; padding:0 2px; }
.connector-v { width:1.5px; min-height:16px; background:var(--border); }
.connector-v.gold { background:var(--gold3); min-height:20px; }
.person-card.has-children::after { content:'▾'; position:absolute; bottom:4px; right:6px; font-size:9px; color:var(--muted); opacity:.6; }
.person-card.collapsed::after { content:'▸'; }
.bday-glow { animation:bdayGlow 1.5s ease-in-out infinite; }
@keyframes bdayGlow { 0%,100%{box-shadow:0 0 8px rgba(212,168,67,.3)} 50%{box-shadow:0 0 20px rgba(212,168,67,.7),0 0 40px rgba(212,168,67,.3)} }

/* ALBUM */
#album-view { padding:32px 16px 80px; }
.album-section { margin-bottom:32px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; overflow:hidden; animation:fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.album-section-header { display:flex; align-items:center; gap:12px; padding:16px 20px; cursor:pointer; border-bottom:1px solid var(--border); background:linear-gradient(135deg,rgba(212,168,67,.06),transparent); }
.album-section-header:hover { background:rgba(212,168,67,.08); }
.section-num { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold); min-width:32px; font-weight:700; }
.section-info { flex:1; }
.section-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:600; color:var(--text); }
.section-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.section-toggle { font-size:18px; color:var(--muted); transition:transform .3s; }
.album-section.open .section-toggle { transform:rotate(180deg); }
.album-section-body { display:none; padding:16px 20px; }
.album-section.open .album-section-body { display:block; }
.children-list { display:flex; flex-direction:column; gap:10px; }
.child-item { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:10px 14px; border-left:3px solid var(--gen2); }
.child-item.unknown { border-left-color:#3a3020; opacity:.6; }
.child-item-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.child-num { font-size:11px; color:var(--muted); font-style:italic; min-width:28px; }
.child-name { font-weight:700; font-size:14px; color:#8bbfd8; }
.child-spouse { font-size:12px; color:var(--muted); }
.child-photo { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--border); margin-left:auto; }
.child-bday { font-size:11px; color:var(--gold); margin-top:3px; }
.child-wedding { font-size:11px; color:#b87ab8; margin-top:2px; }
.grandkids { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.grandkid-tag { background:rgba(122,182,122,.1); border:1px solid rgba(122,182,122,.25); border-radius:20px; padding:3px 10px; font-size:11px; color:var(--gen3); }
.grandkid-tag.unknown { background:rgba(58,48,32,.3); border-color:rgba(58,48,32,.5); color:#5a4a32; font-style:italic; }
.stats-bar { display:flex; gap:20px; justify-content:center; padding:24px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.stat { text-align:center; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:700; color:var(--gold); line-height:1; }
.stat-label { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:1px; }
.legend { display:flex; gap:16px; justify-content:center; padding:12px 16px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
.legend-dot { width:10px; height:10px; border-radius:50%; }

/* SEARCH */
#search-input:focus { border-color:var(--gold) !important; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loader"></div>
  <p>Ma'lumotlar yuklanmoqda...</p>
</div>

<!-- Birthday banner -->
<div id="bday-banner">
  <div class="bday-text" id="bday-text"></div>
</div>

<header>
  <div class="header-sub">Rahimov sulolasi · 2026</div>
  <h1>Rahimovlar — Aminovlar</h1>
  <div class="header-desc">Rahimov Amin + Rohiyat — asos</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tree')" id="tab-tree"><span class="tab-icon">🌳</span> Daraxt</div>
  <div class="tab" onclick="switchTab('album')" id="tab-album"><span class="tab-icon">📖</span> Albom</div>
  <div class="tab" onclick="switchTab('search')" id="tab-search"><span class="tab-icon">🔍</span> Qidiruv</div>
</div>

<div class="view active" id="tree-view">
  <div class="tree-wrap" id="tree-container"></div>
</div>

<div class="view" id="album-view">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen1)"></div> 1-avlod</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen2)"></div> 2-avlod</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen3)"></div> 3-avlod</div>
  </div>
  <div id="album-container" style="padding:0 16px 80px;"></div>
</div>

<div class="view" id="search-view">
  <div style="padding:24px 16px 80px;max-width:600px;margin:0 auto;">
    <div style="position:relative;margin-bottom:24px;">
      <input type="text" id="search-input" placeholder="Ism yoki familiya yozing..." oninput="doSearch()"
        style="width:100%;padding:14px 48px 14px 20px;background:#1c2330;border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:16px;outline:none;font-family:'Mulish',sans-serif;transition:border-color .2s;">
      <span style="position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.5;pointer-events:none;">🔍</span>
    </div>
    <div id="search-results"><div style="color:var(--muted);text-align:center;margin-top:40px;">Ism yozing...</div></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// GOOGLE SHEETS CONFIG
// ═══════════════════════════════════════
const SHEET_ID = '12yYjx2gifamPdd2hlSlFrRAoSoFU72MEUr3VCycHEsI';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

// ═══════════════════════════════════════
// STATIC DATA (fallback + base)
// ═══════════════════════════════════════
const root = {
  name: 'Rahimov Amin', wife: 'Rohiyat',
  children: [
    { num:'1', name:'Rahimov Omonboy', wife:'Davletova Nigora', children:[
      { num:'1.1', name:'Aminova Zebo', spouse:'Mardonbek', children:[
        { num:'1.1.1', name:'Uchqunbek Ilhomov' },
        { num:'1.1.2', name:'Iskandar Ilhomov' },
      ]},
      { num:'1.2', name:'Aminov Hikmat', spouse:'Davletova Yulduz', children:[
        { num:'1.2.1', name:'Omonova Zilola' },
        { num:'1.2.2', name:'Omonov Humoyun' },
      ]},
      { num:'1.3', name:'Aminov Hakim', spouse:null, note:'🌟 Sen', children:[] },
    ]},
    { num:'2', name:'Rahimov Quronboy', wife:'Zamira', children:[
      { num:'2.1', name:'Aminova Sevara', spouse:'Elyor', children:[
        { num:'2.1.1', name:'Sardorbek' },
        { num:'2.1.2', name:'Asrorbek' },
        { num:'2.1.3', name:'Diyorahon' },
      ]},
      { num:'2.2', name:'Aminova Muhabbat', spouse:'Otahon', children:[
        { num:'2.2.1', name:'Alihon' },
      ]},
      { num:'2.3', name:'Aminova Maftuna', spouse:'Sodiqjon', children:[
        { num:'2.3.1', name:'Sadiyahon' },
        { num:'2.3.2', name:'?', unknown:true },
      ]},
      { num:'2.4', name:'Aminova Oygul', spouse:null, children:[] },
      { num:'2.5', name:'Aminov Bahtiyar', spouse:null, children:[] },
    ]},
    { num:'3', name:'Rahimov Reyimboy', wife:'Sanobar', children:[
      { num:'3.1', name:'Aminova Madina', spouse:null, children:[] },
    ]},
    { num:'4', name:'Rahimova Malohat', wife:'Ganja', children:[
      { num:'4.1', name:"Egamberganov Yo'ldosh", spouse:'Marhabo', children:[
        { num:'4.1.1', name:'Ganjayev Abdulloh' },
        { num:'4.1.2', name:'Rayona' },
      ]},
      { num:'4.2', name:'Egamberganov Sanjar', spouse:'Sodadjon', children:[] },
      { num:'4.3', name:'Egamberganov Otomurot', spouse:null, children:[] },
      { num:'4.4', name:'Egamberganov Akbarkeb', spouse:null, children:[] },
    ]},
    { num:'5', name:'Rahimov Rashit', wife:'Dildora', children:[
      { num:'5.1', name:'Aminov Islombek', spouse:'Qunduz', children:[
        { num:'5.1.1', name:'?', unknown:true },
      ]},
      { num:'5.2', name:'Aminov Diyorbek', spouse:null, children:[] },
    ]},
    { num:'6', name:'Rahimov Zafar', wife:'Zaynab', children:[
      { num:'6.1', name:'Aminov Mashhur', spouse:'Sarvinoz', children:[] },
      { num:'6.2', name:'Aminova Zubayda', spouse:null, children:[] },
    ]},
    { num:'7', name:'Rahimov Hasanboy', wife:'Momojon', children:[
      { num:'7.1', name:'Aminova Hadicha', spouse:null, children:[] },
      { num:'7.2', name:'Aminova Husniya', spouse:null, children:[] },
      { num:'7.3', name:'Aminov Mustafo', spouse:null, children:[] },
    ]},
    { num:"8", name:"Rahimov Ho'sinboy", wife:'Shoira', children:[
      { num:'8.1', name:'Aminov Asrorbar', spouse:null, children:[] },
      { num:'8.2', name:'Aminov Abrorbek', spouse:null, children:[] },
      { num:'8.3', name:'Aminov Jaloladdin', spouse:null, children:[] },
    ]},
  ]
};

// Extra data from Sheets: keyed by num
let sheetsData = {}; // { '1.1': { birthdate, weddingdate, photo } }

// ═══════════════════════════════════════
// SHEETS LOADER
// ═══════════════════════════════════════
async function loadSheets() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    // Google wraps response in /*O_o*/ google.visualization.Query.setResponse({...});
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    rows.forEach(row => {
      const c = row.c;
      if (!c || !c[0] || !c[0].v) return;
      const num = String(c[0].v).trim();
      sheetsData[num] = {
        name:        c[1] ? (c[1].v || '') : '',
        spouse:      c[2] ? (c[2].v || '') : '',
        birthdate:   c[3] ? (c[3].v || '') : '',
        weddingdate: c[4] ? (c[4].v || '') : '',
        photo:       c[5] ? (c[5].v || '') : '',
      };
    });
  } catch(e) {
    console.warn('Sheets yuklanmadi, static data ishlatilmoqda:', e);
  }
}

// Merge sheets data into a person node
function getMerged(person) {
  const s = sheetsData[person.num] || {};
  return {
    ...person,
    birthdate:   s.birthdate   || person.birthdate   || '',
    weddingdate: s.weddingdate || person.weddingdate || '',
    photo:       s.photo       || person.photo       || '',
  };
}

// ═══════════════════════════════════════
// BIRTHDAY CHECKER
// ═══════════════════════════════════════
function checkBirthdays() {
  const today = new Date();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const todayStr = `${mm}-${dd}`;
  const bdays = [];

  function scan(persons) {
    persons.forEach(p => {
      const m = getMerged(p);
      if (m.birthdate) {
        // format: DD.MM.YYYY or MM-DD or any with month-day matchable
        const parts = m.birthdate.replace(/\./g,'-').split('-');
        let bMM, bDD;
        if (parts.length >= 3) {
          // DD.MM.YYYY
          bDD = parts[0].padStart(2,'0');
          bMM = parts[1].padStart(2,'0');
        } else if (parts.length === 2) {
          bMM = parts[0].padStart(2,'0');
          bDD = parts[1].padStart(2,'0');
        }
        if (bMM && bDD && `${bMM}-${bDD}` === todayStr) {
          bdays.push(m.name);
        }
      }
      if (p.children) scan(p.children);
    });
  }
  scan(root.children);

  if (bdays.length > 0) {
    const banner = document.getElementById('bday-banner');
    document.getElementById('bday-text').innerHTML =
      `🎂 Bugun tug'ilgan kun: <b>${bdays.join(', ')}</b> — Tabriklaymiz!`;
    banner.classList.add('show');
  }
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab+'-view').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'search') setTimeout(() => document.getElementById('search-input').focus(), 100);
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
function normalize(s) { return s.toLowerCase().replace(/[''`]/g,'').replace(/[^a-z0-9\s]/g,''); }
function matches(text, q) { return normalize(text).includes(normalize(q)); }

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const out = document.getElementById('search-results');
  if (!q) { out.innerHTML = '<div style="color:var(--muted);text-align:center;margin-top:40px;">Ism yozing...</div>'; return; }
  const hits = [];
  root.children.forEach(p1 => {
    const m1 = getMerged(p1);
    if (matches(m1.name+(m1.wife?' '+m1.wife:''), q)) hits.push({ person:m1, path:['Rahimov Amin', m1.name], gen:1 });
    p1.children.forEach(p2 => {
      const m2 = getMerged(p2);
      if (matches(m2.name+(m2.spouse?' '+m2.spouse:''), q)) hits.push({ person:m2, path:['Rahimov Amin', m1.name, m2.name], gen:2 });
      (p2.children||[]).forEach(p3 => {
        const m3 = getMerged(p3);
        if (matches(m3.name, q)) hits.push({ person:m3, path:['Rahimov Amin', m1.name, m2.name, m3.name], gen:3 });
      });
    });
  });
  if (!hits.length) { out.innerHTML = `<div style="color:var(--muted);text-align:center;margin-top:40px;">"<b style="color:var(--text)">${q}</b>" — topilmadi</div>`; return; }
  const cols = {1:'var(--gen1)',2:'var(--gen2)',3:'var(--gen3)'};
  const lbls = {1:'1-avlod',2:'2-avlod',3:'3-avlod'};
  out.innerHTML = hits.map(h => {
    const col = cols[h.gen];
    const pathHtml = h.path.map((p,i) => `<span style="opacity:${.4+i*.2}">${p}</span>`).join(' <span style="opacity:.3">›</span> ');
    const spouse = h.person.spouse || h.person.wife;
    const photoHtml = h.person.photo ? `<img src="${h.person.photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid ${col};float:right;margin-left:12px;" onerror="this.style.display='none'">` : '';
    const bdayHtml = h.person.birthdate ? `<div style="font-size:11px;color:var(--gold);margin-top:3px;">🎂 ${h.person.birthdate}</div>` : '';
    const weddHtml = h.person.weddingdate ? `<div style="font-size:11px;color:#b87ab8;margin-top:2px;">💍 ${h.person.weddingdate}</div>` : '';
    return `<div style="background:var(--bg2);border:1.5px solid ${col};border-radius:14px;padding:16px 18px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <span style="background:${col};color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;">${lbls[h.gen]}</span>
        ${h.person.num ? `<span style="color:var(--muted);font-size:12px;font-family:monospace">${h.person.num}</span>` : ''}
      </div>
      ${photoHtml}
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:${col}">${h.person.name}</div>
      ${spouse ? `<div style="color:var(--muted);font-size:13px;margin-top:2px;">+ ${spouse}</div>` : ''}
      ${h.person.note ? `<div style="color:var(--gold);font-size:12px;margin-top:4px;">${h.person.note}</div>` : ''}
      ${bdayHtml}${weddHtml}
      <div style="margin-top:10px;font-size:12px;color:var(--muted);clear:both">${pathHtml}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// TREE BUILD
// ═══════════════════════════════════════
function buildTree() {
  const wrap = document.getElementById('tree-container');
  const rootDiv = document.createElement('div');
  rootDiv.className = 'root-node';
  rootDiv.innerHTML = `<div class="root-card"><div class="crown">👑</div><div class="name">${root.name}</div><div class="wife">+ ${root.wife}</div></div>`;
  rootDiv.appendChild(el('div','v-line gold','','height:32px'));
  const gen1Row = el('div','gen1-row');
  root.children.forEach((child,i) => gen1Row.appendChild(buildBranch(child,'gen1',i)));
  rootDiv.appendChild(gen1Row);
  wrap.appendChild(rootDiv);
}

function buildBranch(person, genClass) {
  const m = getMerged(person);
  const branch = document.createElement('div');
  branch.className = 'branch';
  branch.appendChild(el('div','connector-v gold','','min-height:20px'));
  const card = document.createElement('div');
  card.className = `person-card ${genClass}`;
  if (m.children && m.children.length > 0) card.classList.add('has-children');
  const isBday = isTodayBday(m.birthdate);
  if (isBday) card.classList.add('bday-glow');
  const photoHtml = m.photo ? `<img class="pcard-photo" src="${m.photo}" onerror="this.style.display='none'">` : '';
  const spouseStr = m.wife ? `<div class="pcard-spouse">+ ${m.wife}</div>` : m.spouse ? `<div class="pcard-spouse">+ ${m.spouse}</div>` : '';
  const bdayHtml = m.birthdate ? `<div class="pcard-bday">🎂 ${m.birthdate}</div>` : '';
  const noteStr = m.note ? `<div style="font-size:10px;color:var(--gold);margin-top:2px;">${m.note}</div>` : '';
  card.innerHTML = `${m.num ? `<span class="pcard-num">${m.num}</span>` : ''}${photoHtml}<div class="pcard-name">${m.name}</div>${spouseStr}${noteStr}${bdayHtml}`;
  if (m.children && m.children.length > 0) {
    let open = true;
    card.addEventListener('click', () => { open=!open; childrenWrap.style.display=open?'flex':'none'; card.classList.toggle('collapsed',!open); });
  }
  branch.appendChild(card);
  if (m.children && m.children.length > 0) {
    const childrenWrap = document.createElement('div');
    childrenWrap.className = 'children-wrap';
    Object.assign(childrenWrap.style, {display:'flex',flexDirection:'column',alignItems:'center',width:'100%'});
    childrenWrap.appendChild(el('div','connector-v','','min-height:14px'));
    const childRow = el('div','children-row');
    m.children.forEach(child => {
      const mc = getMerged(child);
      const cBranch = document.createElement('div');
      cBranch.className = 'child-branch';
      cBranch.appendChild(el('div','connector-v','','min-height:12px'));
      const cCard = document.createElement('div');
      cCard.className = 'person-card gen2';
      if (mc.unknown) cCard.style.opacity = '0.5';
      if (mc.children && mc.children.length > 0) cCard.classList.add('has-children');
      if (isTodayBday(mc.birthdate)) cCard.classList.add('bday-glow');
      const cPhoto = mc.photo ? `<img class="pcard-photo" src="${mc.photo}" onerror="this.style.display='none'" style="width:32px;height:32px;">` : '';
      const cBday = mc.birthdate ? `<div class="pcard-bday">🎂 ${mc.birthdate}</div>` : '';
      cCard.innerHTML = `<span class="pcard-num">${mc.num||''}</span>${cPhoto}<div class="pcard-name">${mc.name}</div>${mc.spouse?`<div class="pcard-spouse">+ ${mc.spouse}</div>`:''}${mc.note?`<div style="font-size:10px;color:var(--gold)">${mc.note}</div>`:''}${cBday}`;
      cBranch.appendChild(cCard);
      if (mc.children && mc.children.length > 0) {
        let gcOpen = true;
        cCard.style.cursor = 'pointer';
        const gcWrap = document.createElement('div');
        gcWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;';
        gcWrap.appendChild(el('div','connector-v','','min-height:10px'));
        const gcRow = el('div','grandchildren-row');
        mc.children.forEach(gc => {
          const mgc = getMerged(gc);
          const gcBranch = document.createElement('div');
          gcBranch.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;';
          gcBranch.appendChild(el('div','connector-v','','min-height:8px'));
          const gcCard = document.createElement('div');
          gcCard.className = 'person-card gen3';
          if (mgc.unknown) gcCard.style.opacity = '0.4';
          if (isTodayBday(mgc.birthdate)) gcCard.classList.add('bday-glow');
          const gcBday = mgc.birthdate ? `<div class="pcard-bday">🎂 ${mgc.birthdate}</div>` : '';
          gcCard.innerHTML = `<span class="pcard-num">${mgc.num||''}</span><div class="pcard-name">${mgc.name}</div>${gcBday}`;
          gcBranch.appendChild(gcCard);
          gcRow.appendChild(gcBranch);
        });
        gcWrap.appendChild(gcRow);
        cBranch.appendChild(gcWrap);
        cCard.addEventListener('click', () => { gcOpen=!gcOpen; gcWrap.style.display=gcOpen?'flex':'none'; cCard.classList.toggle('collapsed',!gcOpen); });
      }
      childRow.appendChild(cBranch);
    });
    childrenWrap.appendChild(childRow);
    branch.appendChild(childrenWrap);
  }
  return branch;
}

// ═══════════════════════════════════════
// ALBUM BUILD
// ═══════════════════════════════════════
function buildAlbum() {
  let gen1=root.children.length, gen2=0, gen3=0;
  root.children.forEach(c => { gen2+=c.children.length; c.children.forEach(gc => { gen3+=(gc.children||[]).length; }); });
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-num">2</div><div class="stat-label">ASOSCHILАР</div></div>
    <div class="stat"><div class="stat-num">${gen1}</div><div class="stat-label">1-AVLOD</div></div>
    <div class="stat"><div class="stat-num">${gen2}</div><div class="stat-label">2-AVLOD</div></div>
    <div class="stat"><div class="stat-num">${gen3}+</div><div class="stat-label">3-AVLOD</div></div>`;
  const container = document.getElementById('album-container');
  root.children.forEach((person, i) => {
    const m = getMerged(person);
    const section = document.createElement('div');
    section.className = 'album-section';
    section.style.animationDelay = `${i*.06}s`;
    const childCount = person.children.length;
    const photoHtml = m.photo ? `<img src="${m.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);margin-left:auto;flex-shrink:0;" onerror="this.style.display='none'">` : '';
    section.innerHTML = `
      <div class="album-section-header" onclick="toggleSection(this)">
        <div class="section-num">${m.num}</div>
        <div class="section-info">
          <div class="section-name">${m.name}</div>
          <div class="section-meta">+ ${m.wife} · ${childCount} farzand</div>
        </div>
        ${photoHtml}
        <div class="section-toggle" style="margin-left:${m.photo?'8px':'0'}">▾</div>
      </div>
      <div class="album-section-body">
        <div class="children-list">
          ${person.children.map(child => {
            const mc = getMerged(child);
            const kids = (child.children||[]);
            const kidsHtml = kids.length > 0
              ? `<div class="grandkids">${kids.map(k => { const mgc=getMerged(k); return `<span class="grandkid-tag ${k.unknown?'unknown':''}">${mgc.name}${mgc.num?` <small style="opacity:.5">${mgc.num}</small>`:''}</span>`; }).join('')}</div>` : '';
            const cPhoto = mc.photo ? `<img class="child-photo" src="${mc.photo}" onerror="this.style.display='none'">` : '';
            const cBday = mc.birthdate ? `<div class="child-bday">🎂 ${mc.birthdate}</div>` : '';
            const cWedd = mc.weddingdate ? `<div class="child-wedding">💍 ${mc.weddingdate}</div>` : '';
            const isBday = isTodayBday(mc.birthdate);
            return `<div class="child-item ${child.unknown?'unknown':''}" ${isBday?'style="border-left-color:var(--gold);background:rgba(212,168,67,.05)"':''}>
              <div class="child-item-header">
                <span class="child-num">${mc.num}</span>
                <span class="child-name">${mc.name}</span>
                ${mc.spouse||mc.wife ? `<span class="child-spouse">+ ${mc.spouse||mc.wife}</span>` : ''}
                ${mc.note ? `<span style="font-size:11px;color:var(--gold);margin-left:auto;">${mc.note}</span>` : ''}
                ${cPhoto}
              </div>
              ${cBday}${cWedd}${kidsHtml}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    if (i===0) section.classList.add('open');
    container.appendChild(section);
  });
}

function toggleSection(header) { header.parentElement.classList.toggle('open'); }

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function el(tag,cls='',html='',style='') {
  const e=document.createElement(tag);
  if(cls) e.className=cls; if(html) e.innerHTML=html; if(style) e.style.cssText=style;
  return e;
}

function isTodayBday(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const parts = dateStr.replace(/\./g,'-').split('-');
  if (parts.length >= 3) return parts[1].padStart(2,'0')===mm && parts[0].padStart(2,'0')===dd;
  return false;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  await loadSheets();
  document.getElementById('loading-screen').style.display = 'none';
  buildTree();
  buildAlbum();
  checkBirthdays();
}
init();
</script>
