<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahimov Sulolasi — Shajara</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2330;
  --gold: #d4a843;
  --gold2: #f0c76a;
  --gold3: #8a6820;
  --text: #e8dcc8;
  --muted: #8b7a5e;
  --border: #2a3441;
  --gen0: #d4a843;
  --gen1: #c0784a;
  --gen2: #5b8fa8;
  --gen3: #7ab67a;
  --shadow: rgba(212, 168, 67, 0.15);
  --tabs-h: 56px;
}

body {
  background: var(--bg);
  font-family: 'Mulish', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle star bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(212,168,67,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 15%, rgba(212,168,67,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 70%, rgba(212,168,67,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 80%, rgba(212,168,67,0.2) 0%, transparent 100%),
    radial-gradient(400px at 50% 0%, rgba(212,168,67,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 48px 24px 32px;
  border-bottom: 1px solid var(--border);
}
header::after {
  content: '';
  position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-sub {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px; font-weight: 600;
}
header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 7vw, 56px);
  color: var(--gold2);
  font-weight: 600;
  line-height: 1.1;
  margin-bottom: 8px;
}
.header-desc {
  color: var(--muted); font-size: 13px;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
}

/* ── TABS ── */
.tabs {
  position: sticky; top: 0; z-index: 10;
  display: flex;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: var(--tabs-h);
}
.tab {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 8px; font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  transition: all 0.25s;
  border-bottom: 2px solid transparent;
  letter-spacing: 0.5px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-icon { font-size: 16px; }

/* ── VIEWS ── */
.view { display: none; position: relative; z-index: 1; }
.view.active { display: block; }

/* ════════════════════════════════
   TREE VIEW
════════════════════════════════ */
#tree-view { padding: 40px 16px 80px; overflow-x: auto; overflow-y: auto; }
#search-input:focus { border-color: var(--gold) !important; }

.tree-wrap {
  min-width: max-content;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}

/* Root node */
.root-node {
  display: flex; flex-direction: column; align-items: center;
}
.root-card {
  background: linear-gradient(135deg, #2a1f0a, #1a1208);
  border: 2px solid var(--gold);
  border-radius: 16px;
  padding: 16px 28px;
  text-align: center;
  box-shadow: 0 0 30px rgba(212,168,67,0.2), 0 8px 32px rgba(0,0,0,0.5);
  position: relative;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 20px rgba(212,168,67,0.2), 0 8px 32px rgba(0,0,0,0.5); }
  50% { box-shadow: 0 0 40px rgba(212,168,67,0.35), 0 8px 32px rgba(0,0,0,0.5); }
}
.root-card .crown { font-size: 20px; margin-bottom: 4px; }
.root-card .name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 700; color: var(--gold2);
}
.root-card .wife { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Connector lines */
.v-line {
  width: 2px; background: linear-gradient(180deg, var(--gold3), var(--border));
  flex-shrink: 0;
}
.h-line-wrap {
  display: flex; align-items: flex-start; position: relative; width: 100%;
}

/* Gen 1 row */
.gen1-row {
  display: flex; justify-content: center;
  gap: 12px; width: 100%;
  padding: 0 8px;
}

.branch {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; min-width: 0;
}

/* Person cards */
.person-card {
  border-radius: 12px;
  padding: 10px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  border: 1.5px solid;
  position: relative;
}
.person-card:hover { transform: translateY(-2px); }

.person-card.gen1 {
  background: linear-gradient(135deg, #1e1208, #160d05);
  border-color: var(--gen1);
  box-shadow: 0 4px 16px rgba(192,120,74,0.15);
}
.person-card.gen2 {
  background: linear-gradient(135deg, #0d1820, #091218);
  border-color: var(--gen2);
  box-shadow: 0 3px 12px rgba(91,143,168,0.12);
}
.person-card.gen3 {
  background: linear-gradient(135deg, #0d1a0d, #091209);
  border-color: var(--gen3);
  box-shadow: 0 2px 8px rgba(122,182,122,0.1);
}

.pcard-num {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  background: var(--bg);
  padding: 0 6px;
  font-size: 10px; color: var(--muted);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  white-space: nowrap;
}
.pcard-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; font-weight: 600;
  line-height: 1.3;
}
.gen1 .pcard-name { color: #e8a870; font-size: 14px; }
.gen2 .pcard-name { color: #8bbfd8; }
.gen3 .pcard-name { color: #9dd49d; font-size: 12px; }

.pcard-spouse { font-size: 10px; color: var(--muted); margin-top: 2px; }
.pcard-unknown { font-size: 10px; color: #4a3a2a; font-style: italic; }

/* Children container */
.children-wrap {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; margin-top: 0;
}
.children-row {
  display: flex; gap: 6px; justify-content: center;
  width: 100%; padding: 0 4px;
}
.child-branch {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; min-width: 0;
}
.grandchildren-row {
  display: flex; gap: 4px; justify-content: center;
  width: 100%; padding: 0 2px;
}

/* Vertical connectors */
.connector-v { width: 1.5px; min-height: 16px; background: var(--border); }
.connector-v.gold { background: var(--gold3); min-height: 20px; }
.connector-h {
  height: 1.5px; background: var(--border);
  align-self: flex-start; margin-top: 0;
}

/* Toggle indicator */
.person-card.has-children::after {
  content: '▾';
  position: absolute; bottom: 4px; right: 6px;
  font-size: 9px; color: var(--muted); opacity: 0.6;
}
.person-card.collapsed::after { content: '▸'; }

/* ════════════════════════════════
   ALBOM VIEW
════════════════════════════════ */
#album-view { padding: 32px 16px 80px; }

.album-section {
  margin-bottom: 32px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.album-section-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
  background: linear-gradient(135deg, rgba(212,168,67,0.06), transparent);
}
.album-section-header:hover { background: rgba(212,168,67,0.08); }

.section-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; color: var(--gold);
  min-width: 32px; font-weight: 700;
}
.section-info { flex: 1; }
.section-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 600; color: var(--text);
}
.section-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.section-toggle {
  font-size: 18px; color: var(--muted);
  transition: transform 0.3s;
}
.album-section.open .section-toggle { transform: rotate(180deg); }

.album-section-body {
  display: none; padding: 16px 20px;
}
.album-section.open .album-section-body { display: block; }

/* Children list in album */
.children-list { display: flex; flex-direction: column; gap: 10px; }

.child-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  border-left: 3px solid var(--gen2);
}
.child-item.unknown { border-left-color: #3a3020; opacity: 0.6; }

.child-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.child-num { font-size: 11px; color: var(--muted); font-style: italic; min-width: 28px; }
.child-name { font-weight: 700; font-size: 14px; color: #8bbfd8; }
.child-spouse { font-size: 12px; color: var(--muted); }

.grandkids { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.grandkid-tag {
  background: rgba(122,182,122,0.1);
  border: 1px solid rgba(122,182,122,0.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px; color: var(--gen3);
}
.grandkid-tag.unknown {
  background: rgba(58,48,32,0.3);
  border-color: rgba(58,48,32,0.5);
  color: #5a4a32; font-style: italic;
}

/* Stats bar */
.stats-bar {
  display: flex; gap: 20px; justify-content: center;
  padding: 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px; font-weight: 700; color: var(--gold);
  line-height: 1;
}
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }

/* Legend */
.legend {
  display: flex; gap: 16px; justify-content: center;
  padding: 12px 16px; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Gen badge */
.gen-badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
}
</style>
</head>
<body>

<header>
  <div class="header-sub">Rahimov sulolasi · 2026</div>
  <h1>Rahimovlar — Aminovlar</h1>
  <div class="header-desc">Rahimov Amin + Rohat — asos</div>
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('tree')" id="tab-tree">
    <span class="tab-icon">🌳</span> Shajara daraxti
  </div>
  <div class="tab" onclick="switchTab('album')" id="tab-album">
    <span class="tab-icon">📖</span> Albom ko'rinish
  </div>
  <div class="tab" onclick="switchTab('search')" id="tab-search">
    <span class="tab-icon">🔍</span> Qidiruv
  </div>
</div>

<!-- TREE VIEW -->
<div class="view active" id="tree-view">
  <div class="tree-wrap" id="tree-container"></div>
</div>

<!-- ALBUM VIEW -->
<div class="view" id="album-view">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen1)"></div> 1-avlod (8 farzand)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen2)"></div> 2-avlod (nabiralar)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gen3)"></div> 3-avlod (evara)</div>
  </div>
  <div id="album-container" style="padding:0 16px 80px;"></div>
</div>

<!-- SEARCH VIEW -->
<div class="view" id="search-view">
  <div style="padding:24px 16px 80px; max-width:600px; margin:0 auto;">
    <div style="position:relative; margin-bottom:24px;">
      <input type="text" id="search-input" placeholder="Ism yoki familiya yozing..."
        oninput="doSearch()"
        style="width:100%;padding:14px 48px 14px 20px;background:#1c2330;border:1.5px solid var(--border);border-radius:999px;color:var(--text);font-size:16px;outline:none;font-family:'Mulish',sans-serif;transition:border-color 0.2s;">
      <span style="position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;opacity:0.5;pointer-events:none;">🔍</span>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const root = {
  name: 'Rahimov Amin',
  wife: 'Rohiyat',
  children: [
    {
      num: '1', name: 'Rahimov Omonboy', wife: 'Davletova Nigora',
      children: [
        {
          num: '1.1', name: 'Aminova Zebo', spouse: 'Mardonbek',
          children: [
            { num: '1.1.1', name: 'Uchqunbek Ilhomov' },
            { num: '1.1.2', name: 'Iskandar Ilhomov' },
          ]
        },
        {
          num: '1.2', name: 'Aminov Hikmat', spouse: 'Davletova Yulduz',
          children: [
            { num: '1.2.1', name: 'Omonova Zilola' },
            { num: '1.2.2', name: 'Omonov Humoyun' },
          ]
        },
        { num: '1.3', name: 'Aminov Hakim', spouse: null, note: '🌟 Sen', children: [] },
      ]
    },
    {
      num: '2', name: 'Rahimov Quronboy', wife: 'Zamira',
      children: [
        {
          num: '2.1', name: 'Aminova Sevara', spouse: 'Elyor',
          children: [
            { num: '2.1.1', name: 'Sardorbek' },
            { num: '2.1.2', name: 'Asrorbek' },
            { num: '2.1.3', name: 'Diyorahon' },
          ]
        },
        {
          num: '2.2', name: 'Aminova Muhabbat', spouse: 'Otahon',
          children: [
            { num: '2.2.1', name: 'Alihon' },
          ]
        },
        {
          num: '2.3', name: 'Aminova Maftuna', spouse: 'Sodiqjon',
          children: [
            { num: '2.3.1', name: 'Sadiyahon' },
            { num: '2.3.2', name: '?', unknown: true },
          ]
        },
        { num: '2.4', name: 'Aminova Oygul', spouse: null, children: [] },
        { num: '2.5', name: 'Aminov Bahtiyar', spouse: null, children: [] },
      ]
    },
    {
      num: '3', name: 'Rahimov Reyimboy', wife: 'Sanobar',
      children: [
        { num: '3.1', name: 'Aminova Madina', spouse: null, children: [] },
      ]
    },
    {
      num: '4', name: 'Rahimova Malohat', wife: 'Ganja',
      children: [
        {
          num: '4.1', name: 'Egamberganov Yo\'ldosh', spouse: 'Marhabo',
          children: [
            { num: '4.1.1', name: 'Ganjayev Abdulloh' },
            { num: '4.1.2', name: 'Rayona' },
          ]
        },
        { num: '4.2', name: 'Egamberganov Sanjar', spouse: 'Sodadjon', children: [] },
        { num: '4.3', name: 'Egamberganov Otomurot', spouse: null, children: [] },
        { num: '4.4', name: 'Egamberganov Akbarkeb', spouse: null, children: [] },
      ]
    },
    {
      num: '5', name: 'Rahimov Rashit', wife: 'Dildora',
      children: [
        {
          num: '5.1', name: 'Aminov Islombek', spouse: 'Qunduz',
          children: [{ num: '5.1.1', name: '?', unknown: true }]
        },
        { num: '5.2', name: 'Aminov Diyorbek', spouse: null, children: [] },
      ]
    },
    {
      num: '6', name: 'Rahimov Zafar', wife: 'Zaynab',
      children: [
        { num: '6.1', name: 'Aminov Mashhur', spouse: 'Sarvinoz', children: [] },
        { num: '6.2', name: 'Aminova Zubayda', spouse: null, children: [] },
      ]
    },
    {
      num: '7', name: 'Rahimov Hasanboy', wife: 'Momojon',
      children: [
        { num: '7.1', name: 'Aminova Hadicha', spouse: null, children: [] },
        { num: '7.2', name: 'Aminova Husniya', spouse: null, children: [] },
        { num: '7.3', name: 'Aminov Mustafo', spouse: null, children: [] },
      ]
    },
    {
      num: '8', name: 'Rahimov Ho\'sinboy', wife: 'Shoira',
      children: [
        { num: '8.1', name: 'Aminov Asrorbar', spouse: null, children: [] },
        { num: '8.2', name: 'Aminov Abrorbek', spouse: null, children: [] },
        { num: '8.3', name: 'Aminov Jaloladdin', spouse: null, children: [] },
      ]
    },
  ]
};

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab + '-view').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'search') {
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
function normalize(s) {
  return s.toLowerCase().replace(/[''`]/g,'').replace(/[^a-z0-9\s]/g,'');
}
function matches(text, q) {
  return normalize(text).includes(normalize(q));
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const out = document.getElementById('search-results');
  if (!q) { out.innerHTML = '<div style="color:var(--muted);text-align:center;margin-top:40px;">Ism yozing...</div>'; return; }

  const hits = [];

  // Search all levels
  root.children.forEach(p1 => {
    const p1name = p1.name + (p1.wife ? ' ' + p1.wife : '');
    if (matches(p1name, q)) hits.push({ person: p1, path: ['Rahimov Amin', p1.name], gen: 1 });

    p1.children.forEach(p2 => {
      const p2name = p2.name + (p2.spouse ? ' ' + p2.spouse : '') + (p2.wife ? ' ' + p2.wife : '');
      if (matches(p2name, q)) hits.push({ person: p2, path: ['Rahimov Amin', p1.name, p2.name], gen: 2 });

      (p2.children || []).forEach(p3 => {
        if (matches(p3.name, q)) hits.push({ person: p3, path: ['Rahimov Amin', p1.name, p2.name, p3.name], gen: 3 });
      });
    });
  });

  if (!hits.length) {
    out.innerHTML = `<div style="color:var(--muted);text-align:center;margin-top:40px;">
      "<b style="color:var(--text)">${q}</b>" — topilmadi</div>`;
    return;
  }

  const genColors = { 1: 'var(--gen1)', 2: 'var(--gen2)', 3: 'var(--gen3)' };
  const genLabels = { 1: '1-avlod', 2: '2-avlod', 3: '3-avlod' };

  out.innerHTML = hits.map(h => {
    const col = genColors[h.gen];
    const pathHtml = h.path.map((p, i) => `<span style="opacity:${0.4 + i*0.2}">${p}</span>`).join(' <span style="opacity:0.3">›</span> ');
    const spouse = h.person.spouse || h.person.wife;
    return `
      <div style="background:var(--bg2);border:1.5px solid ${col};border-radius:14px;padding:16px 18px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="background:${col};color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;opacity:0.85">${genLabels[h.gen]}</span>
          ${h.person.num ? `<span style="color:var(--muted);font-size:12px;font-family:monospace">${h.person.num}</span>` : ''}
        </div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:${col}">${h.person.name}</div>
        ${spouse ? `<div style="color:var(--muted);font-size:13px;margin-top:2px;">+ ${spouse}</div>` : ''}
        ${h.person.note ? `<div style="color:var(--gold);font-size:12px;margin-top:4px;">${h.person.note}</div>` : ''}
        <div style="margin-top:10px;font-size:12px;color:var(--muted)">${pathHtml}</div>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════
// TREE VIEW BUILD
// ═══════════════════════════════════════
function buildTree() {
  const wrap = document.getElementById('tree-container');

  // Root
  const rootDiv = document.createElement('div');
  rootDiv.className = 'root-node';
  rootDiv.innerHTML = `
    <div class="root-card">
      <div class="crown">👑</div>
      <div class="name">${root.name}</div>
      <div class="wife">+ ${root.wife}</div>
    </div>
  `;

  // V line down
  const vLine1 = el('div', 'v-line gold', '', 'height:32px');
  rootDiv.appendChild(vLine1);

  // H connector across all gen1
  const gen1Count = root.children.length;

  // Gen1 row
  const gen1Row = el('div', 'gen1-row');
  root.children.forEach((child, i) => {
    const branch = buildBranch(child, 'gen1', i);
    gen1Row.appendChild(branch);
  });
  rootDiv.appendChild(gen1Row);
  wrap.appendChild(rootDiv);
}

function buildBranch(person, genClass, idx) {
  const branch = document.createElement('div');
  branch.className = 'branch';

  // V line from parent
  branch.appendChild(el('div', 'connector-v gold', '', 'min-height:20px'));

  // Person card
  const card = document.createElement('div');
  card.className = `person-card ${genClass}`;
  if (person.children && person.children.length > 0) card.classList.add('has-children');

  const numSpan = person.num ? `<span class="pcard-num">${person.num}</span>` : '';
  const spouseStr = person.wife
    ? `<div class="pcard-spouse">+ ${person.wife}</div>`
    : person.spouse
    ? `<div class="pcard-spouse">+ ${person.spouse}</div>`
    : '';
  const noteStr = person.note ? `<div style="font-size:10px;color:var(--gold);margin-top:2px;">${person.note}</div>` : '';
  const unknownStr = person.unknown ? `<div class="pcard-unknown">esda yo'q</div>` : '';

  card.innerHTML = `
    ${numSpan}
    <div class="pcard-name">${person.name}</div>
    ${spouseStr}${noteStr}${unknownStr}
  `;

  // Toggle children
  if (person.children && person.children.length > 0) {
    let open = true;
    card.addEventListener('click', () => {
      open = !open;
      childrenWrap.style.display = open ? 'flex' : 'none';
      card.classList.toggle('collapsed', !open);
    });
  }

  branch.appendChild(card);

  // Children
  if (person.children && person.children.length > 0) {
    const childrenWrap = document.createElement('div');
    childrenWrap.className = 'children-wrap';
    childrenWrap.style.display = 'flex';
    childrenWrap.style.flexDirection = 'column';
    childrenWrap.style.alignItems = 'center';
    childrenWrap.style.width = '100%';

    // V line
    childrenWrap.appendChild(el('div', 'connector-v', '', 'min-height:14px'));

    // Children row
    const childRow = document.createElement('div');
    childRow.className = 'children-row';

    person.children.forEach(child => {
      const cBranch = document.createElement('div');
      cBranch.className = 'child-branch';
      cBranch.appendChild(el('div', 'connector-v', '', 'min-height:12px'));

      const cCard = document.createElement('div');
      cCard.className = `person-card gen2`;
      if (child.unknown) cCard.style.opacity = '0.5';
      if (child.children && child.children.length > 0) cCard.classList.add('has-children');

      const cSpouse = child.spouse ? `<div class="pcard-spouse">+ ${child.spouse}</div>` : '';
      const cNote = child.note ? `<div style="font-size:10px;color:var(--gold);margin-top:2px;">${child.note}</div>` : '';
      cCard.innerHTML = `
        <span class="pcard-num">${child.num || ''}</span>
        <div class="pcard-name">${child.name}</div>
        ${cSpouse}${cNote}
      `;

      cBranch.appendChild(cCard);

      // Grandchildren
      if (child.children && child.children.length > 0) {
        let gcOpen = true;
        cCard.style.cursor = 'pointer';
        cCard.classList.add('has-children');

        const gcWrap = document.createElement('div');
        gcWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;';

        gcWrap.appendChild(el('div', 'connector-v', '', 'min-height:10px'));
        const gcRow = document.createElement('div');
        gcRow.className = 'grandchildren-row';

        child.children.forEach(gc => {
          const gcBranch = document.createElement('div');
          gcBranch.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;';
          gcBranch.appendChild(el('div', 'connector-v', '', 'min-height:8px'));
          const gcCard = document.createElement('div');
          gcCard.className = 'person-card gen3';
          if (gc.unknown) gcCard.style.opacity = '0.4';
          gcCard.innerHTML = `<span class="pcard-num">${gc.num||''}</span><div class="pcard-name">${gc.name}</div>`;
          gcBranch.appendChild(gcCard);
          gcRow.appendChild(gcBranch);
        });

        gcWrap.appendChild(gcRow);
        cBranch.appendChild(gcWrap);

        cCard.addEventListener('click', () => {
          gcOpen = !gcOpen;
          gcWrap.style.display = gcOpen ? 'flex' : 'none';
          cCard.classList.toggle('collapsed', !gcOpen);
        });
      }

      childRow.appendChild(cBranch);
    });

    childrenWrap.appendChild(childRow);
    branch.appendChild(childrenWrap);
  }

  return branch;
}

function el(tag, cls = '', html = '', style = '') {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  if (style) e.style.cssText = style;
  return e;
}

// ═══════════════════════════════════════
// ALBUM VIEW BUILD
// ═══════════════════════════════════════
function buildAlbum() {
  // Stats
  let gen1 = root.children.length;
  let gen2 = 0, gen3 = 0;
  root.children.forEach(c => {
    gen2 += c.children.length;
    c.children.forEach(gc => { gen3 += (gc.children || []).length; });
  });

  const statsBar = document.getElementById('stats-bar');
  statsBar.innerHTML = `
    <div class="stat"><div class="stat-num">2</div><div class="stat-label">ASOSCHILАР</div></div>
    <div class="stat"><div class="stat-num">${gen1}</div><div class="stat-label">1-AVLOD</div></div>
    <div class="stat"><div class="stat-num">${gen2}</div><div class="stat-label">2-AVLOD</div></div>
    <div class="stat"><div class="stat-num">${gen3}+</div><div class="stat-label">3-AVLOD</div></div>
  `;

  const container = document.getElementById('album-container');

  root.children.forEach((person, i) => {
    const section = document.createElement('div');
    section.className = 'album-section';
    section.style.animationDelay = `${i * 0.06}s`;

    const childCount = person.children.length;

    section.innerHTML = `
      <div class="album-section-header" onclick="toggleSection(this)">
        <div class="section-num">${person.num}</div>
        <div class="section-info">
          <div class="section-name">${person.name}</div>
          <div class="section-meta">+ ${person.wife} · ${childCount} farzand</div>
        </div>
        <div class="section-toggle">▾</div>
      </div>
      <div class="album-section-body">
        <div class="children-list">
          ${person.children.map(child => {
            const kids = (child.children || []);
            const kidsHtml = kids.length > 0
              ? `<div class="grandkids">${kids.map(k =>
                  `<span class="grandkid-tag ${k.unknown?'unknown':''}">${k.name}${k.num ? ` <small style="opacity:0.5">${k.num}</small>` : ''}</span>`
                ).join('')}</div>`
              : '';
            return `
              <div class="child-item ${child.unknown?'unknown':''}">
                <div class="child-item-header">
                  <span class="child-num">${child.num}</span>
                  <span class="child-name">${child.name}</span>
                  ${child.spouse || child.wife ? `<span class="child-spouse">+ ${child.spouse||child.wife}</span>` : ''}
                  ${child.note ? `<span style="font-size:11px;color:var(--gold);margin-left:auto;">${child.note}</span>` : ''}
                </div>
                ${kidsHtml}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;

    // Open first one by default
    if (i === 0) section.classList.add('open');

    container.appendChild(section);
  });
}

function toggleSection(header) {
  header.parentElement.classList.toggle('open');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildTree();
buildAlbum();
</script>
